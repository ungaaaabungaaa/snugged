services:
  postgres:
    image: postgres:16-alpine
    container_name: snugged-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: snugged
    ports:
      - "5432:5432"
    volumes:
      - snugged-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d snugged"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: snugged-redis
    ports:
      - "6379:6379"
    volumes:
      - snugged-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: snugged-meilisearch
    environment:
      MEILI_MASTER_KEY: masterKey
    ports:
      - "7700:7700"
    volumes:
      - snugged-meili:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  snugged-postgres:
  snugged-redis:
  snugged-meili:
